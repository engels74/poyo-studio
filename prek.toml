# prek.toml — pre-commit hooks configuration
# Docs: https://prek.j178.dev/configuration/

# Builtin hooks — fast, offline, Rust-native.
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=512"] },
  { id = "detect-private-key" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "no-commit-to-branch", args = ["--branch", "main"] },
]

# Conventional Commits — enforce Conventional Commit message format.
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"] },
]

# Secret / credential leak guard.
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
  { id = "gitleaks" },
]

# Local Bun/SvelteKit quality gates. These become active when application files are
# introduced; package.json will define the scripts in the foundation milestone.
[[repos]]
repo = "local"

[[repos.hooks]]
id = "bun-format-check"
name = "bun format check"
entry = "bun run format:check"
language = "system"
files = "^(src|tests|scripts|static)/|^(package\\.json|biome\\.json|components\\.json|svelte\\.config\\.(js|ts)|vite\\.config\\.(js|ts)|uno\\.config\\.(js|ts)|tsconfig\\.json)$"
pass_filenames = false

[[repos.hooks]]
id = "bun-lint"
name = "bun lint"
entry = "bun run lint"
language = "system"
files = "^(src|tests|scripts)/|^(package\\.json|biome\\.json|svelte\\.config\\.(js|ts)|vite\\.config\\.(js|ts)|uno\\.config\\.(js|ts)|tsconfig\\.json)$"
pass_filenames = false

[[repos.hooks]]
id = "svelte-check"
name = "svelte check"
entry = "bun run check"
language = "system"
files = "^(src|tests|scripts)/|^(package\\.json|svelte\\.config\\.(js|ts)|vite\\.config\\.(js|ts)|uno\\.config\\.(js|ts)|tsconfig\\.json)$"
pass_filenames = false

[[repos.hooks]]
id = "bun-test"
name = "bun test"
entry = "bun test"
language = "system"
files = "^(src|tests|scripts)/|^(package\\.json|bunfig\\.toml|tsconfig\\.json|svelte\\.config\\.(js|ts)|vite\\.config\\.(js|ts))$"
pass_filenames = false

[[repos.hooks]]
id = "registry-validate"
name = "model registry validation"
entry = "bun run registry:validate"
language = "system"
files = "^(src/lib/features/registry|tests/.*/registry|scripts/.*registry|docs/model-audit)/|^package\\.json$"
pass_filenames = false

[[repos.hooks]]
id = "bun-build"
name = "bun production build"
entry = "bun --bun run build"
language = "system"
files = "^(src|static)/|^(package\\.json|svelte\\.config\\.(js|ts)|vite\\.config\\.(js|ts)|uno\\.config\\.(js|ts)|tsconfig\\.json)$"
pass_filenames = false
